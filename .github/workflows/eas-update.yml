name: EAS Update (OTA)
# Otomatis kirim OTA update ke semua APK setiap push ke main
# Tidak perlu rebuild APK — hanya update bundle JS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'assets/**'
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan OTA update'
        required: false
        default: 'Manual trigger — CI maintenance'

jobs:
  update:
    name: Push OTA ke semua APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install

      - name: Push OTA update ke channel production
        run: |
          eas update \
            --channel production \
            --message "${{ github.event.inputs.message || github.event.head_commit.message }}" \
            --auto

