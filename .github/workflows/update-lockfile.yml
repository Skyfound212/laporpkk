name: Update yarn.lock

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lockfile:
    name: Regenerate yarn.lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Regenerate yarn.lock
        run: yarn install

      - name: Commit updated yarn.lock
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add yarn.lock
          git diff --staged --quiet || git commit -m 'chore: update yarn.lock (add expo-clipboard)'
          git push
